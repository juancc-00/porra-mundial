<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Porra Mundial ⚽</title>
</head>
<body>

<h1>⚽ Porra Mundial</h1>

<div id="login-section">
  <button id="loginBtn">Entrar con Google</button>
</div>

<div id="user-section" style="display:none;">
  <p>Bienvenido, <span id="userName"></span></p>

  <button onclick="location.href='mis-porras.html'">
    Mis porras
  </button>

  <button onclick="location.href='mis-predicciones.html'">
    Mis predicciones
  </button>

  <br><br>
  <button id="logoutBtn">Cerrar sesión</button>
</div>

<script type="module">

import { initializeApp } from 
  "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from 
  "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// 🔥 PEGA AQUÍ TU CONFIG DE FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const loginSection = document.getElementById("login-section");
const userSection = document.getElementById("user-section");
const userName = document.getElementById("userName");


// 🔐 Login con Google
loginBtn.onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};


// 🔓 Logout
logoutBtn.onclick = () => signOut(auth);


// 👤 Detectar usuario
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginSection.style.display = "none";
    userSection.style.display = "block";
    userName.textContent = user.displayName;
  } else {
    loginSection.style.display = "block";
    userSection.style.display = "none";
  }
});

</script>

</body>
</html>
