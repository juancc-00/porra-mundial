    // Variables globales
    let calendarioInstancia = null;
    let eventosCalendario = [];

    async function cargarDatos() {
        const snapshot = await getDocs(collection(db, "partidos"));
        const partidosPorFecha = {};
        eventosCalendario = [];

        snapshot.forEach(doc => {
            const p = doc.data();

            // 1. Agrupar para la lista
            if (!partidosPorFecha[p.Fecha]) {
                partidosPorFecha[p.Fecha] = [];
            }
            partidosPorFecha[p.Fecha].push(p);

            // 2. Preparar datos para FullCalendar
            const [d, m, a] = p.Fecha.split("/");
            const fechaISO = `${a}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            const fechaHoraISO = `${fechaISO}T${p.Hora}:00`;
            const tituloEvento = (p.Resultado && p.Resultado.trim() !== "")
                ? `${p.Pais1} ${p.Resultado} ${p.Pais2}`
                : `${p.Pais1} vs ${p.Pais2}`;

            eventosCalendario.push({
                title: tituloEvento,
                start: fechaHoraISO,
                allDay: false
            });
        });

        // Pintar la lista (siempre visible)
        mostrarLista(partidosPorFecha);

        // Inicializar el calendario (aunque esté oculto en el HTML)
        inicializarCalendarioPlugin();
    }

    // --- Funciones de utilidad para fechas ---
    function parseFecha(fechaStr) {
        const [d, m, a] = fechaStr.split("/");
        return new Date(a, m - 1, d);
    }

    function parseFechaHora(fechaStr, horaStr) {
        const [d, m, a] = fechaStr.split("/");
        const [h, min] = horaStr.split(":");
        return new Date(a, m - 1, d, h, min);
    }

    function formatearFechaLarga(fechaStr) {
        const dias = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];
        const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const date = parseFecha(fechaStr);
        return `${dias[date.getDay()]} ${date.getDate()} ${meses[date.getMonth()]} ${date.getFullYear()}`;
    }

    // --- Renderizar la lista inferior ---
    function mostrarLista(partidosPorFecha) {
        const contenedor = document.getElementById("contenedorCalendario");
        contenedor.innerHTML = "";

        const fechasOrdenadas = Object.keys(partidosPorFecha).sort((a, b) => parseFecha(a) - parseFecha(b));

        fechasOrdenadas.forEach(fecha => {
            const partidosDelDia = partidosPorFecha[fecha];
            partidosDelDia.sort((a, b) => parseFechaHora(a.Fecha, a.Hora) - parseFechaHora(b.Fecha, b.Hora));

            const divDia = document.createElement("div");
            divDia.className = "dia-calendario";
            divDia.innerHTML = `
              <div class="dia-encabezado">
                  <h3>${formatearFechaLarga(fecha)}</h3>
                  <a href="clasificacion.html" class="ver-grupos">Ver grupos</a>
              </div>
          `;

            partidosDelDia.forEach(p => {
                const codPais1 = codigos_pais[p.Pais1] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais1]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;
                const codPais2 = codigos_pais[p.Pais2] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais2]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;
                const textoCentro = (p.Resultado && p.Resultado.trim() !== "") ? p.Resultado : p.Hora;

                divDia.innerHTML += `
                  <div class="partido-calendario">
                      <div class="partido-fila">
                          <div class="equipo">${p.Pais1}</div>
                          <img class="bandera-calendario" src="${codPais1}">
                          <div class="hora-partido">${textoCentro}</div>
                          <img class="bandera-calendario" src="${codPais2}">
                          <div class="equipo">${p.Pais2}</div>
                      </div>
                      <div class="partido-detalles">Primera fase · ${p.Fase} · ${p.Estadio}</div>
                  </div>
              `;
            });
            contenedor.appendChild(divDia);
        });
    }

    const paises_abreviaturas = {
        "México": "MEX",
        "Suecia": "SUE",
        "Estados Unidos": "USA",
        "Canadá": "CAN",
        "Argentina": "ARG",

        "Nueva Zelanda": "NZL"
    }

function inicializarCalendarioPlugin() {
    const calendarEl = document.getElementById('calendarioPlugin');
    
    calendarioInstancia = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        initialDate: '2026-06-11',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        events: eventosCalendario,
        eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },

        eventContent: function(arg) {
            // 1. Obtener la hora formateada (usa el eventTimeFormat que definiste arriba)
            let hora = arg.timeText; 
            
            // 2. Procesar el título para cambiar nombres por siglas
            let nuevoTitulo = arg.event.title;
            Object.keys(paises_abreviaturas).forEach(pais => {
                if (nuevoTitulo.includes(pais)) {
                    // Usamos una expresión regular simple para cambiar todas las ocurrencias
                    nuevoTitulo = nuevoTitulo.split(pais).join(paises_abreviaturas[pais]);
                }
            });

            // 3. Devolver el HTML combinando ambos
            // Creamos una estructura similar a la original de FullCalendar
            return { 
                html: `
                    <div class="fc-event-main-frame">
                        ${hora ? `<span class="fc-event-time" style="font-weight: bold; margin-right: 3px;">${hora}</span>` : ''}
                        <span class="fc-event-title">${nuevoTitulo}</span>
                    </div>
                ` 
            };
        }
    });
    
    calendarioInstancia.render();
}

    // --- Lógica del botón (Solo muestra/oculta el calendario superior) ---
    document.getElementById('btnToggleVista').addEventListener('click', () => {
        const contCalendario = document.getElementById('contenedorVistaCalendario');
        const btn = document.getElementById('btnToggleVista');

        if (contCalendario.style.display === 'none') {
            contCalendario.style.display = 'block';
            btn.innerHTML = 'Ocultar Vista de Calendario';

            // 🔥 Forzar renderizado para que FullCalendar calcule bien su tamaño al volverse visible
            if (calendarioInstancia) {
                calendarioInstancia.render();
            }
        } else {
            contCalendario.style.display = 'none';
            btn.innerHTML = 'Vista de Calendario';
        }
    });

    // Iniciar todo
    await cargarDatos();

</script>
