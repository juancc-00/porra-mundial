<!DOCTYPE html>
<html>

<head>
  <title>Porra</title>
  <link rel="icon" href="../static/media/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../static/porra_style.css">
  <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
</head>

<body>

  <header class="topbar">

    <button class="nav-btn" onclick="location.href='home.html'">Inicio</button>
    <button class="nav-btn">Información</button>
    <button class="nav-btn" onclick="location.href='calendario-resultados.html'">Calendario y Resultados</button>
    <button class="nav-btn" onclick="location.href='misporras.html'">Mis Porras</button>

  </header>

  <main>
    <div class="container">

      <div class="cabecera-container">
        <h1 id="nombrePorra">Cargando...</h1>
        <p>ID: <span id="idPorra"></span></p>
      </div>

      <div class="dashboard-grid">
        <section class="panel-box">
          <h2>Clasificación</h2>
          <ul class="ranking-list" id="listaClasificacion">
            <li class="ranking-item top-1">
              <div class="ranking-user"><span class="pos">1</span> Juan</div><span class="pts">120 pts</span>
            </li>
            <li class="ranking-item top-2">
              <div class="ranking-user"><span class="pos">2</span> Alberto</div><span class="pts">105 pts</span>
            </li>
            <li class="ranking-item top-3">
              <div class="ranking-user"><span class="pos">3</span> Lalo</div><span class="pts">90 pts</span>
            </li>
          </ul>
        </section>

        <section class="panel-box">
          <h2>Actividad reciente</h2>
          <div class="logs-container" id="listaLogs">
            <!-- <div class="log-item"><span class="log-time">Hace 2 horas</span>
              <p>Comienza la fase de grupos</p> -->
            </div>
          </div>
        </section>
      </div>

      <section class="panel-box partidos-section">
        <h2>Próximos Partidos</h2>
        <div class="galeria-wrapper">
          <button id="btnScrollIzq" class="btn-scroll">❮</button>
          <div id="contenedorGaleria" class="galeria-partidos">
          </div>
          <button id="btnScrollDer" class="btn-scroll">❯</button>
        </div>
      </section>

      <section class="panel-box chart-section">
        <h2>Progresión de la porra</h2>
        <div class="chart-container">
          <canvas id="graficoProgresion"></canvas>
        </div>
      </section>

    </div>
  </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../static/js/codigos_paises.js"></script>
<script type="module">
  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    getDocs,
    query,
    orderBy,
    limit
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {
    getAuth,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const paises_abreviaturas = {
    "México": "MEX", "Suecia": "SUE", "Estados Unidos": "USA", "Canadá": "CAN",
    "Argentina": "ARG", "Brasil": "BRA", "Colombia": "COL", "Uruguay": "URU",
    "Ecuador": "ECU", "Paraguay": "PAR", "España": "ESP", "Francia": "FRA",
    "Inglaterra": "ENG", "Portugal": "POR", "Bélgica": "BEL", "Países Bajos": "NED",
    "Alemania": "GER", "Italia": "ITA", "Croacia": "CRO", "Suiza": "SUI",
    "Dinamarca": "DEN", "Austria": "AUT", "Noruega": "NOR", "República Checa": "CZE",
    "Bosnia y Herzegovina": "BIH", "Escocia": "SCO", "Turquía": "TUR", "Marruecos": "MAR",
    "Senegal": "SEN", "Egipto": "EGY", "Costa de Marfil": "CIV", "Nigeria": "NGA",
    "Túnez": "TUN", "Argelia": "ALG", "Sudáfrica": "RSA", "Ghana": "GHA", "Cabo Verde": "CPV",
    "RD Congo": "COD", "Japón": "JPN", "Corea del Sur": "KOR", "Irán": "IRN",
    "Australia": "AUS", "Arabia Saudita": "KSA", "Catar": "QAT", "Irak": "IRQ",
    "Uzbekistán": "UZB", "Jordania": "JOR", "Panamá": "PAN", "Haití": "HAI",
    "Curazao": "CUW", "Nueva Zelanda": "NZL"
  };

  const partidos_ordenados = {1: 1, 2: 2, 3: 3, 4: 4, 5: 8, 6: 7, 7: 5, 8: 6, 9: 10, 10: 11, 11: 9, 12: 12, 13: 14, 14: 16, 15: 13, 16: 15, 17: 17, 18: 18, 19: 19, 20: 20, 21: 23, 22: 22, 23: 21, 24: 24, 25: 25, 26: 26, 27: 27, 28: 28, 29: 32, 30: 30, 31: 29, 32: 31, 33: 35, 34: 33, 35: 34, 36: 36, 37: 38, 38: 39, 39: 37, 40: 40, 41: 43, 42: 42, 43: 41, 44: 44, 45: 47, 46: 45, 47: 46, 48: 48, 49: 51, 50: 52, 51: 49, 52: 50, 53: 53, 54: 54, 55: 55, 56: 56, 57: 57, 58: 58, 59: 59, 60: 60, 61: 61, 62: 62, 63: 66, 64: 65, 65: 63, 66: 64, 67: 67, 68: 68, 69: 71, 70: 72, 71: 69, 72: 70, 73: 73, 74: 76, 75: 74, 76: 75, 77: 78, 78: 77, 79: 79, 80: 80, 81: 82, 82: 81, 83: 84, 84: 83, 85: 85, 86: 88, 87: 86, 88: 87, 89: 90, 90: 89, 91: 91, 92: 92, 93: 93, 94: 94, 95: 95, 96: 96, 97: 97, 98: 98, 99: 99, 100: 100, 101: 101, 102: 102, 103: 103, 104: 104};

  // Mapa inverso para buscar eficientemente qué posición cronológica tiene cada ID de Firebase
  const mapa_cronologico = {};
  for (const [orden, idF] of Object.entries(partidos_ordenados)) {
    mapa_cronologico[idF] = parseInt(orden);
  }

  const firebaseConfig = {
    apiKey: "AIzaSyB-ckFMY4qIC05I3LZj4nv3BJx6TtfEKt8",
    authDomain: "porra-mundial-91819.firebaseapp.com",
    projectId: "porra-mundial-91819",
    storageBucket: "porra-mundial-91819.firebasestorage.app",
    messagingSenderId: "281151008271",
    appId: "1:281151008271:web:1e1da3163adb4f2b493d7a",
    measurementId: "G-G37R8RYVXQ"
  };

  const params = new URLSearchParams(window.location.search);
  const idPorra = params.get("id");

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let chartProgresion = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "home.html";
      return;
    }
    await cargarPorra(idPorra, user);
  });

  async function cargarPorra(id, user) {
    const ref = doc(db, "porras", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      alert("La porra no existe");
      window.location.href = "misporras.html";
      return;
    }

    const dataPorra = snap.data();
    document.getElementById("nombrePorra").textContent = dataPorra.nombre;
    document.getElementById("idPorra").textContent = dataPorra.ID;

    // --- CARGAR LOGS DE ACTIVIDAD RECIENTE ---
    cargarLogsActividad(id);

    const desglose_puntos = dataPorra.desglose_puntos || {};

    const configRef = doc(db, "config", "procesados");
    const configSnap = await getDoc(configRef);
    const idsProcesados = configSnap.exists() ? configSnap.data().ids : [];

    const miembrosData = [];
    for (const uid of dataPorra.miembros) {
      const userRef = doc(db, "usuarios", uid);
      const userSnap = await getDoc(userRef);
      const nombre = userSnap.exists() ? userSnap.data().nombre : "Jugador";

      const predRef = doc(db, "predicciones", uid, "grupos", "datos");
      const predSnap = await getDoc(predRef);
      const predicciones = predSnap.exists() ? predSnap.data() : {};

      miembrosData.push({ 
        uid, 
        nombre, 
        predicciones, 
        ptsPorPartido: desglose_puntos[uid] || {} 
      });
    }

    const partidosJugados = procesarPuntos(miembrosData, desglose_puntos);
    renderizarClasificacion(miembrosData);
    renderizarGrafico(miembrosData, partidosJugados);

    const partidosSnap = await getDocs(collection(db, "partidos"));
    let todosLosPartidos = [];
    partidosSnap.forEach(doc => todosLosPartidos.push({ idDoc: doc.id, ...doc.data() }));

    // --- NUEVA LÓGICA DE ORDENACIÓN CRONOLÓGICA ---
    todosLosPartidos.sort((a, b) => {
      // Ordenamos en base a nuestro mapa inverso. 
      // Si por error un partido no está en el mapa, lo mandamos al final (999)
      const ordenA = mapa_cronologico[a.Numero] || 999;
      const ordenB = mapa_cronologico[b.Numero] || 999;
      return ordenA - ordenB;
    });

    // Como todosLosPartidos ya está ordenado, los filtrados mantienen el orden perfecto
    const partidosPasados = todosLosPartidos.filter(p => idsProcesados.includes(p.Numero.toString()));
    const partidosFuturos = todosLosPartidos.filter(p => !idsProcesados.includes(p.Numero.toString()));
    const proximos3 = partidosFuturos.slice(0, 3);
    
    // Al unirlos, quedan: [Pasados en orden] + [3 Próximos en orden]
    const partidosAMostrar = [...partidosPasados, ...proximos3];

    renderizarGaleria(partidosAMostrar, miembrosData, idsProcesados);
  }

  // --- NUEVA FUNCIÓN: LOGS DE ACTIVIDAD ---
  async function cargarLogsActividad(id) {
    const listaLogs = document.getElementById("listaLogs");
    listaLogs.innerHTML = "<em>Cargando...</em>";

    try {
      // Pedimos todos los logs de la colección
      const logsSnap = await getDocs(collection(db, "actividad", id, "logs"));
      let logsArr = [];
      logsSnap.forEach(doc => logsArr.push({ idDoc: doc.id, ...doc.data() }));

      // Si usas IDs autogenerados de Firebase (que incluyen orden por fecha), 
      // ordenarlos lexicográficamente a la inversa te da del más nuevo al más viejo.
      // Si en los logs estás guardando una variable "timestamp" o "fecha", puedes cambiar idDoc por esa variable.
      logsArr.sort((a, b) => b.idDoc.localeCompare(a.idDoc));

      const tresRecientes = logsArr.slice(0, 3);

      listaLogs.innerHTML = "";
      if (tresRecientes.length === 0) {
        listaLogs.innerHTML = "<p>No hay actividad reciente</p>";
      }

      tresRecientes.forEach(log => {
        const div = document.createElement("div");
        div.className = "log-item";
        // Si no tienes una variable de hora guardada en tu documento, mostramos "Novedad"
        const horaTexto = log.hora ? log.hora : "Actualización"; 
        div.innerHTML = `
          <span class="log-time">${horaTexto}</span>
          <p>${log.texto}</p>
        `;
        listaLogs.appendChild(div);
      });

    } catch (e) {
      console.error("Error al cargar actividad: ", e);
      listaLogs.innerHTML = "<p>Error al cargar la actividad</p>";
    }
  }

  function renderizarGaleria(partidos, miembros, idsProcesados) {
    const contenedor = document.getElementById("contenedorGaleria");
    contenedor.innerHTML = "";

    partidos.forEach(p => {
      const pIdStr = p.Numero.toString();
      const esPasado = idsProcesados.includes(pIdStr);
      
      const abr1 = paises_abreviaturas[p.Pais1] || p.Pais1;
      const abr2 = paises_abreviaturas[p.Pais2] || p.Pais2;

      const codPais1 = codigos_pais && codigos_pais[p.Pais1] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais1]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;
      const codPais2 = codigos_pais && codigos_pais[p.Pais2] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais2]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;

      const cabeceraPartido = `${p.Fecha} - ${p.Hora} | ${p.Fase}`;
      const separadorEquipos = esPasado ? `${p.g1} : ${p.g2}` : "vs";

      const card = document.createElement("div");
      card.className = "partido-card";

      let htmlContent = `
      <div class="partido-info-top">
        ${cabeceraPartido}
      </div>
      <div class="partido-equipos">
        <span><img src="${codPais1}" class="bandera-card"> ${abr1}</span>
        <span style="font-weight:bold; margin: 0 8px;">${separadorEquipos}</span>
        <span>${abr2} <img src="${codPais2}" class="bandera-card"></span>
      </div>
      <div class="predicciones-grupo">
        <h4 style="margin: 5px 0; color:#444; font-size: 0.85em;">Predicciones:</h4>
    `;

      miembros.forEach(miembro => {
        const pred = miembro.predicciones[pIdStr] ?? miembro.predicciones[p.Numero];
        let textoPred = "-";
        
        if (pred && pred.g1 !== undefined && pred.g2 !== undefined) {
          textoPred = `${pred.g1} - ${pred.g2}`;
        }

        let badgePuntos = "";
        if (esPasado) {
          const pts = miembro.ptsPorPartido[pIdStr] ?? miembro.ptsPorPartido[p.Numero] ?? 0;
          const color = pts > 0 ? 'green' : '#999';
          badgePuntos = `<span style="color:${color}; font-weight:bold; font-size:0.8em; margin-left:5px;">(+${pts})</span>`;
        }

        htmlContent += `
        <div class="prediccion-fila">
          <span style="font-size:0.85em;">${miembro.nombre}</span>
          <span class="resultado-pred">${textoPred} ${badgePuntos}</span>
        </div>
      `;
      });

      htmlContent += `</div>`;
      card.innerHTML = htmlContent;
      contenedor.appendChild(card);
    });
  }

  function procesarPuntos(miembrosData, desglose_puntos) {
    let partidosSet = new Set();
    for (const uid in desglose_puntos) {
      for (const partidoId in desglose_puntos[uid]) {
        partidosSet.add(parseInt(partidoId));
      }
    }
    const partidosOrdenados = Array.from(partidosSet).sort((a, b) => a - b);

    miembrosData.forEach(miembro => {
      const ptsUsuario = desglose_puntos[miembro.uid] || {};
      let total = 0;
      let acumulado = [0];
      partidosOrdenados.forEach(pId => {
        total += (ptsUsuario[pId.toString()] ?? ptsUsuario[pId] ?? 0);
        acumulado.push(total);
      });
      miembro.totalPuntos = total;
      miembro.datosGrafico = acumulado;
    });
    return partidosOrdenados;
  }

  function renderizarClasificacion(miembrosData) {
    const lista = document.getElementById("listaClasificacion");
    lista.innerHTML = "";
    const clasificacion = [...miembrosData].sort((a, b) => b.totalPuntos - a.totalPuntos);
    clasificacion.forEach((miembro, index) => {
      const pos = index + 1;
      const li = document.createElement("li");
      li.className = `ranking-item top-${pos > 3 ? 'extra' : pos}`;
      li.innerHTML = `
        <div class="ranking-user"><span class="pos">${pos}</span> ${miembro.nombre}</div>
        <span class="pts">${miembro.totalPuntos} pts</span>
      `;
      lista.appendChild(li);
    });
  }

  function renderizarGrafico(miembrosData, partidosJugados) {
    const ctx = document.getElementById('graficoProgresion').getContext('2d');
    const labelsPartidos = ['Inicio'].concat(partidosJugados.map(p => `P ${p}`));
    const colores = ['#FFD700', '#4bc0c0', '#ff6384', '#36a2eb', '#9966ff', '#ff9f40'];
    const datasets = miembrosData.map((miembro, index) => ({
      label: miembro.nombre,
      data: miembro.datosGrafico,
      borderColor: colores[index % colores.length],
      backgroundColor: colores[index % colores.length],
      tension: 0.3,
      borderWidth: 2
    }));

    if (chartProgresion) chartProgresion.destroy();
    chartProgresion = new Chart(ctx, {
      type: 'line',
      data: { labels: labelsPartidos, datasets: datasets },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
      }
    });
  }

  document.getElementById("btnScrollIzq").addEventListener("click", () => {
    document.getElementById("contenedorGaleria").scrollBy({ left: -300, behavior: 'smooth' });
  });
  document.getElementById("btnScrollDer").addEventListener("click", () => {
    document.getElementById("contenedorGaleria").scrollBy({ left: 300, behavior: 'smooth' });
  });
</script>


</html>
