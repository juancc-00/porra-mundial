  async function obtenerAlias(uid) {

    const ref = doc(db, "usuarios", uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      return snap.data().nombre;
    }

    return "Jugador";

  }

  async function cargarPorra(id, user) {
    const ref = doc(db, "porras", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      alert("La porra no existe");
      window.location.href = "mis-porras.html";
      return;
    }

    const dataPorra = snap.data();
    document.getElementById("nombrePorra").textContent = dataPorra.nombre;
    document.getElementById("idPorra").textContent = dataPorra.ID;

    // 1. Cargar la información y predicciones de TODOS los miembros del grupo
    const miembrosData = [];
    for (const uid of dataPorra.miembros) {
      const userRef = doc(db, "usuarios", uid);
      const userSnap = await getDoc(userRef);
      const nombre = userSnap.exists() ? userSnap.data().nombre : "Jugador";

      const predRef = doc(db, "predicciones", uid);
      const predSnap = await getDoc(predRef);
      const predicciones = predSnap.exists() ? predSnap.data() : {};

      miembrosData.push({ uid, nombre, predicciones });
    }

    // 2. Cargar todos los partidos
    const partidosSnap = await getDocs(collection(db, "partidos"));
    let partidos = [];
    partidosSnap.forEach(doc => partidos.push({ idDoc: doc.id, ...doc.data() }));

    // Ordenar cronológicamente (usando una función auxiliar básica)
    partidos.sort((a, b) => {
      const fechaA = a.Fecha.split("/").reverse().join(""); // DD/MM/YYYY -> YYYYMMDD
      const fechaB = b.Fecha.split("/").reverse().join("");
      if (fechaA === fechaB) return a.Hora.localeCompare(b.Hora);
      return fechaA.localeCompare(fechaB);
    });

    // 3. Construir la galería en el DOM
    renderizarGaleria(partidos, miembrosData);
  }

  function renderizarGaleria(partidos, miembros) {
    const contenedor = document.getElementById("contenedorGaleria");
    contenedor.innerHTML = "";

    partidos.forEach(p => {
      // Si usas un diccionario de banderas, puedes integrarlo aquí. Usaremos emojis o un placeholder de momento.
      const bandera1 = `https://via.placeholder.com/40x40.png?text=${p.Pais1.charAt(0)}`;
      const bandera2 = `https://via.placeholder.com/40x40.png?text=${p.Pais2.charAt(0)}`;

      const card = document.createElement("div");
      card.className = "partido-card";

      // Cabecera del partido
      let htmlContent = `
      <div class="partido-info-top">
        ${p.Fecha} - ${p.Hora} | ${p.Fase}
      </div>
      <div class="partido-equipos">
        <span><img src="${bandera1}" class="bandera-card"> ${p.Pais1}</span>
        <span>vs</span>
        <span>${p.Pais2} <img src="${bandera2}" class="bandera-card"></span>
      </div>
      <div class="predicciones-grupo">
        <h4 style="margin-top:0; color:#444; font-size: 0.9em;">Predicciones del grupo:</h4>
    `;

      // Filas de predicciones de cada miembro
      miembros.forEach(miembro => {
        // Asumimos que la clave en firebase coincide con alguna propiedad, como p.Numero o el id del documento
        // Asegúrate de ajustar "p.Numero" al nombre exacto del campo que usas en la BBDD
        const predPartido = miembro.predicciones[p.Numero];

        let textoPred = "-";
        if (predPartido && predPartido.g1 !== undefined && predPartido.g2 !== undefined) {
          textoPred = `${predPartido.g1} - ${predPartido.g2}`;
        }

        htmlContent += `
        <div class="prediccion-fila">
          <span>${miembro.nombre}</span>
          <span class="resultado-pred">${textoPred}</span>
        </div>
      `;
      });

      htmlContent += `</div>`; // Cierra predicciones-grupo
      card.innerHTML = htmlContent;
      contenedor.appendChild(card);
    });
  }
