<!DOCTYPE html>
<html>

<head>
  <title>Porra</title>
  <link rel="icon" href="../static/media/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../static/porra_style.css">
  <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
</head>

<body>

  <header class="topbar">

    <button class="nav-btn" onclick="location.href='home.html'">Inicio</button>
    <button class="nav-btn">Información</button>
    <button class="nav-btn" onclick="location.href='clasificacion.html'">Clasificación</button>
    <button class="nav-btn" onclick="location.href='calendario-resultados.html'">Calendario y Resultados</button>
    <button class="nav-btn" onclick="location.href='misporras.html'">Mis Porras</button>

  </header>

  <main>
    <div class="container">

      <div class="cabecera-container">
        <h1 id="nombrePorra">Cargando...</h1>
        <p>ID: <span id="idPorra"></span></p>
      </div>

      <div class="dashboard-grid">
        <section class="panel-box">
          <h2>🏆 Clasificación</h2>
          <ul class="ranking-list" id="listaClasificacion">
            <li class="ranking-item top-1">
              <div class="ranking-user"><span class="pos">1</span> Juan</div><span class="pts">120 pts</span>
            </li>
            <li class="ranking-item top-2">
              <div class="ranking-user"><span class="pos">2</span> Alberto</div><span class="pts">105 pts</span>
            </li>
            <li class="ranking-item top-3">
              <div class="ranking-user"><span class="pos">3</span> Lalo</div><span class="pts">90 pts</span>
            </li>
          </ul>
        </section>

        <section class="panel-box">
          <h2>Logs</h2>
          <div class="logs-container" id="listaLogs">
            <div class="log-item"><span class="log-time">Hace 2 horas</span>
              <p>Comienza la fase de grupos</p>
            </div>
          </div>
        </section>
      </div>

      <section class="panel-box partidos-section">
        <h2>Próximos Partidos</h2>
        <div class="galeria-wrapper">
          <button id="btnScrollIzq" class="btn-scroll">❮</button>
          <div id="contenedorGaleria" class="galeria-partidos">
          </div>
          <button id="btnScrollDer" class="btn-scroll">❯</button>
        </div>
      </section>

      <section class="panel-box chart-section">
        <h2>Progresión del Grupo</h2>
        <div class="chart-container">
          <canvas id="graficoProgresion"></canvas>
        </div>
      </section>

    </div>
  </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../static/js/codigos_paises.js"></script>
<script type="module">

  import {
    getFirestore,
    doc,
    getDoc,
    collection,   // <-- Añadimos esto aquí
    getDocs       // <-- Y esto aquí
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {
    getAuth,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


  const firebaseConfig = {
    apiKey: "AIzaSyB-ckFMY4qIC05I3LZj4nv3BJx6TtfEKt8",
    authDomain: "porra-mundial-91819.firebaseapp.com",
    projectId: "porra-mundial-91819",
    storageBucket: "porra-mundial-91819.firebasestorage.app",
    messagingSenderId: "281151008271",
    appId: "1:281151008271:web:1e1da3163adb4f2b493d7a",
    measurementId: "G-G37R8RYVXQ"
  };

  const params = new URLSearchParams(window.location.search);
  const idPorra = params.get("id");

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "home.html";
      return;
    }
    await cargarPorra(idPorra, user);
  });

  async function obtenerAlias(uid) {

    const ref = doc(db, "usuarios", uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      return snap.data().nombre;
    }

    return "Jugador";

  }

  async function cargarPorra(id, user) {
    const ref = doc(db, "porras", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      alert("La porra no existe");
      window.location.href = "mis-porras.html";
      return;
    }

    const dataPorra = snap.data();
    document.getElementById("nombrePorra").textContent = dataPorra.nombre;
    document.getElementById("idPorra").textContent = dataPorra.ID;

    // 1. Cargar la información y predicciones de TODOS los miembros del grupo
    const miembrosData = [];
    for (const uid of dataPorra.miembros) {
      const userRef = doc(db, "usuarios", uid);
      const userSnap = await getDoc(userRef);
      const nombre = userSnap.exists() ? userSnap.data().nombre : "Jugador";

      const predRef = doc(db, "predicciones", uid);
      const predSnap = await getDoc(predRef);
      const predicciones = predSnap.exists() ? predSnap.data() : {};

      miembrosData.push({ uid, nombre, predicciones });
    }

    // 2. Cargar todos los partidos
    const partidosSnap = await getDocs(collection(db, "partidos"));
    let partidos = [];
    partidosSnap.forEach(doc => partidos.push({ idDoc: doc.id, ...doc.data() }));

    // Ordenar cronológicamente (usando una función auxiliar básica)
    partidos.sort((a, b) => {
      const fechaA = a.Fecha.split("/").reverse().join(""); // DD/MM/YYYY -> YYYYMMDD
      const fechaB = b.Fecha.split("/").reverse().join("");
      if (fechaA === fechaB) return a.Hora.localeCompare(b.Hora);
      return fechaA.localeCompare(fechaB);
    });

    // 3. Construir la galería en el DOM
    renderizarGaleria(partidos, miembrosData);
  }

  function renderizarGaleria(partidos, miembros) {
    const contenedor = document.getElementById("contenedorGaleria");
    contenedor.innerHTML = "";

    partidos.forEach(p => {
      // Si usas un diccionario de banderas, puedes integrarlo aquí. Usaremos emojis o un placeholder de momento.
      const bandera1 = `https://via.placeholder.com/40x40.png?text=${p.Pais1.charAt(0)}`;
      const bandera2 = `https://via.placeholder.com/40x40.png?text=${p.Pais2.charAt(0)}`;


      const codPais1 = codigos_pais[p.Pais1] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais1]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;
      const codPais2 = codigos_pais[p.Pais2] ? `https://flagcdn.com/w40/${codigos_pais[p.Pais2]}.png` : `https://via.placeholder.com/40x40.png?text=🛡️`;


      // <img class="bandera-calendario" src="${codPais1}">

      const card = document.createElement("div");
      card.className = "partido-card";

      // Cabecera del partido
      let htmlContent = `
      <div class="partido-info-top">
        ${p.Fecha} - ${p.Hora} | ${p.Fase}
      </div>
      <div class="partido-equipos">
        <span><img src="${codPais1}" class="bandera-card"> ${p.Pais1}</span>
        <span>vs</span>
        <span>${p.Pais2} <img src="${codPais2}" class="bandera-card"></span>
      </div>
      <div class="predicciones-grupo">
        <h4 style="margin-top:0; color:#444; font-size: 0.9em;">Predicciones del grupo:</h4>
    `;

      // Filas de predicciones de cada miembro
      miembros.forEach(miembro => {
        // Asumimos que la clave en firebase coincide con alguna propiedad, como p.Numero o el id del documento
        // Asegúrate de ajustar "p.Numero" al nombre exacto del campo que usas en la BBDD
        const predPartido = miembro.predicciones[p.Numero];

        let textoPred = "-";
        if (predPartido && predPartido.g1 !== undefined && predPartido.g2 !== undefined) {
          textoPred = `${predPartido.g1} - ${predPartido.g2}`;
        }

        htmlContent += `
        <div class="prediccion-fila">
          <span>${miembro.nombre}</span>
          <span class="resultado-pred">${textoPred}</span>
        </div>
      `;
      });

      htmlContent += `</div>`; // Cierra predicciones-grupo
      card.innerHTML = htmlContent;
      contenedor.appendChild(card);
    });
  }

  // Lógica para los botones de scroll de la galería
  document.getElementById("btnScrollIzq").addEventListener("click", () => {
    const galeria = document.getElementById("contenedorGaleria");
    // Desplaza hacia la izquierda suavemente
    galeria.scrollBy({ left: -340, behavior: 'smooth' });
  });

  document.getElementById("btnScrollDer").addEventListener("click", () => {
    const galeria = document.getElementById("contenedorGaleria");
    // Desplaza hacia la derecha suavemente
    galeria.scrollBy({ left: 340, behavior: 'smooth' });
  });

  // Función para renderizar el gráfico con Chart.js
  function renderizarGrafico() {
    const ctx = document.getElementById('graficoProgresion').getContext('2d');

    // Datos de prueba (Eje X: Partidos jugados)
    const labelsPartidos = ['Partido 1', 'Partido 2', 'Partido 3', 'Partido 4', 'Partido 5', 'Partido 6'];

    const data = {
      labels: labelsPartidos,
      datasets: [
        {
          label: 'Juan',
          data: [0, 3, 3, 6, 8, 12], // Puntos acumulados en cada partido
          borderColor: '#FFD700',    // Color de la línea (Dorado)
          backgroundColor: '#FFD700',
          tension: 0.3,              // Curva suave
          borderWidth: 3
        },
        {
          label: 'Alberto',
          data: [0, 0, 2, 5, 5, 10],
          borderColor: '#4bc0c0',    // Turquesa
          backgroundColor: '#4bc0c0',
          tension: 0.3,
          borderWidth: 2
        },
        {
          label: 'Lalo',
          data: [0, 3, 6, 6, 9, 9],
          borderColor: '#ff6384',    // Rosa
          backgroundColor: '#ff6384',
          tension: 0.3,
          borderWidth: 2
        }
      ]
    };

    new Chart(ctx, {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true,
            title: {
              display: true,
              text: 'Puntos Acumulados'
            }
          },
          x: {
            title: {
              display: true,
              text: 'Partidos'
            }
          }
        },
        plugins: {
          legend: {
            position: 'top',
          },
          tooltip: {
            mode: 'index',
            intersect: false,
          }
        },
        interaction: {
          mode: 'nearest',
          axis: 'x',
          intersect: false
        }
      }
    });
  }

  // Llama a la función para que se pinte (asegúrate de llamarla en tu flujo real)
  renderizarGrafico();

</script>


</html>
