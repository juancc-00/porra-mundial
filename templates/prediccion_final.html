function tiempoRestante(fecha) {
  const objetivo = new Date(fecha);
  const diff = objetivo - new Date();

  if (diff <= 0) return "0h";

  const minutosTotales = Math.floor(diff / 60000);
  const horasTotales = Math.floor(minutosTotales / 60);
  const dias = Math.floor(horasTotales / 24);

  if (dias > 0) {
    return `${dias} días, ${horasTotales % 24} horas`;
  }

  const horas = horasTotales;
  const minutos = minutosTotales % 60;

  return `${horas} horas, ${minutos} minutos`;
}

function actualizar_estado_usuario(n_pred) {
  const contenedor_usuario = document.getElementById("estado-usuario");

  if (!contenedor_usuario) return;

  // Mostrar / ocultar contenedor
  contenedor_usuario.style.display = editable ? "block" : "none";

  // Limpiar clases previas para evitar acumulación
  contenedor_usuario.classList.remove(
    "prediccion-completa",
    "prediccion-incompleta"
  );

  // Fecha límite
  const tiempo = tiempoRestante("2026-07-18T23:00");

  console.log("n_predicciones", n_pred);

  // Comparación correcta (&& en lugar de &)
  if (n_pred === 2) {
    contenedor_usuario.classList.add("prediccion-completa");
    contenedor_usuario.innerHTML = `
      <i class="fa-solid fa-circle-check"></i> Tus predicciones están al día, tienes ${tiempo} para modificarlas si lo deseas.

  } else {
    contenedor_usuario.classList.add("prediccion-incompleta");
    contenedor_usuario.innerHTML = `
      <i class="fa-solid fa-triangle-exclamation"></i> Predicciones incompletas. Completa tus predicciones antes de que cierre el plazo en ${tiempo}
    `;
  }
};

var num_pred = 0;
let prediccionFinal = { g1: null, g2: null, ganador: null };
let prediccionTercer = { g1: null, g2: null, ganador: null };

async function cargarPredicciones() {
  const user = auth.currentUser;
  if (!user) return;
  const uid = user.uid;

  // Final
  const refFinal = doc(db, "predicciones", uid, "final", "datos");
  const snapFinal = await getDoc(refFinal);
  if (snapFinal.exists()) {
    const data = snapFinal.data();
    const pred = data[104];
    if (pred) {
      prediccionFinal.g1 = pred.g1;
      prediccionFinal.g2 = pred.g2;
      prediccionFinal.ganador = pred.ganador;
    }
  }

  // Tercer puesto
  const refTercer = doc(db, "predicciones", uid, "tercer", "datos");
  const snapTercer = await getDoc(refTercer);
  if (snapTercer.exists()) {
    const data = snapTercer.data();
    const pred = data[103];
    if (pred) {
      prediccionTercer.g1 = pred.g1;
      prediccionTercer.g2 = pred.g2;
      prediccionTercer.ganador = pred.ganador;
    }
  }

  num_pred = (snapFinal.exists() ? 1 : 0) + (snapTercer.exists() ? 1 : 0);
  actualizarUIeliminatorias();
  actualizar_estado_usuario(num_pred);
}


function actualizarUIeliminatorias() {
  // Mapeamos cada partido a su contenedor específico
  const partidos = [
    { partido: prediccionFinal, contenedorId: "contenedorFinal" },
    { partido: prediccionTercer, contenedorId: "contenedorTercer" }
  ];

  partidos.forEach(({ partido, contenedorId }) => {
    const contenedor = document.getElementById(contenedorId);
    if (!contenedor) return;

    const container = contenedor.querySelector(".partido-container");
    if (!container) return;

    const div = container.querySelector(".partido");
    const goles = div.querySelectorAll(".gol");

    if (partido.g1 !== null) goles[0].textContent = partido.g1;
    if (partido.g2 !== null) goles[1].textContent = partido.g2;

    if (container._actualizarSelector) {
      container._actualizarSelector();
    }
  });
}



async function cargarPartidos() {
  // Leer solo los 2 documentos necesarios directamente por Numero
  const q = query(
    collection(db, "partidos"),
    where("Numero", "in", ["103", "104"])
  );
  const snapshot = await getDocs(q);
  console.log(snapshot);
  snapshot.forEach(doc => {
    const p = doc.data();
    console.log(p);
    if (p.Numero === "104") prediccionFinal = { ...p, g1: null, g2: null, ganador: null };
    if (p.Numero === "103") prediccionTercer = { ...p, g1: null, g2: null, ganador: null };
  });
  // console.log(prediccionFinal);
  mostrarPartidos();
}



function parseFechaHora(p) {

  const [d, m, a] = p.Fecha.split("/");
  const [h, min] = p.Hora.split(":");

  return new Date(a, m - 1, d, h, min);

}

function formatearFecha(p) {

  const meses = [
    "Ene","Feb","Mar","Abr","May","Jun",
    "Jul","Ago","Sep","Oct","Nov","Dic"
  ];

  const [d, m] = p.Fecha.split("/");

  return `${parseInt(d)} ${meses[m - 1]} · ${p.Hora}`;
}




await cargarPartidos();

function mostrarPartidos() {
  const contenedorFinal = document.getElementById("contenedorFinal");
  const contenedorTercer = document.getElementById("contenedorTercer");

  contenedorFinal.innerHTML = "";
  contenedorTercer.innerHTML = "";

  contenedorFinal.appendChild(crearPartidoEliminatoria(prediccionFinal));
  contenedorTercer.appendChild(crearPartidoEliminatoria(prediccionTercer));
}

function crearPartidoEliminatoria(p) {

  const divcontainer = document.createElement("div");
  divcontainer.className = "partido-container"; // opcional

  const div = document.createElement("div");
  div.className = "partido";
  div.dataset.id = p.Numero;

  const codigo1 = codigos_pais[p.Pais1];
  const codigo2 = codigos_pais[p.Pais2];

  div.innerHTML = `
    <div class="fecha">${formatearFecha(p)}</div>

    <div class="equipo">${p.Pais1}</div>
    <img class="bandera" src="https://flagcdn.com/w40/${codigo1}.png">

    <div class="gol">-</div>
    <div class="gol">-</div>

    <img class="bandera" src="https://flagcdn.com/w40/${codigo2}.png">
    <div class="equipo derecha">${p.Pais2}</div>
  `;

  const selector = document.createElement("div");
  selector.classList.add("selector-ganador", "hidden");

  const goles = div.querySelectorAll(".gol");

  // ======================
  // FUNCION CLAVE (NO DEPENDE DEL DOM INTERNO)
  // ======================

  function actualizarSelector() {

    if (p.g1 === null || p.g2 === null) return;

    if (p.g1 === p.g2) {

      selector.classList.remove("hidden");

      selector.innerHTML = `
        <div class="toggle">
          <span class="opcion ${p.ganador === 0 ? "activo" : ""}" data-lado="1">${p.Pais1}</span>
          <span class="opcion ${p.ganador === 1 ? "activo" : ""}" data-lado="2">${p.Pais2}</span>
        </div>
      `;

      selector.querySelectorAll(".opcion").forEach(op => {
        op.onclick = () => {
          p.ganador = op.dataset.lado == "1" ? 0 : 1;
          actualizarSelector();
        };
      });

    } else {

      selector.classList.add("hidden");

      p.ganador = p.g1 > p.g2 ? 0 : 1;
    }
  }

  // ======================
  // EVENTOS GOLES
  // ======================

  if (editable) {

    goles[0].onclick = () =>
      abrirPicker(goles[0], val => {
        goles[0].textContent = val;
        p.g1 = val;
        actualizarSelector();
      });

    goles[1].onclick = () =>
      abrirPicker(goles[1], val => {
        goles[1].textContent = val;
        p.g2 = val;
        actualizarSelector();
      });

  }

  // 🔥 IMPORTANTE: guardar referencia para luego (UI update)
  divcontainer._actualizarSelector = actualizarSelector;

  // 🔥 montar estructura
  div.appendChild(selector);
  divcontainer.appendChild(div);
  

  return divcontainer;
}



const picker = document.getElementById("picker");
let callbackActual = null;

function abrirPicker(elemento, callback) {

  callbackActual = callback;

  const rect = elemento.getBoundingClientRect();

  picker.style.left = rect.left + "px";
  picker.style.top = rect.bottom + 5 + "px";

  picker.style.display = "grid";

  mostrarOpciones();
}

function mostrarOpciones() {

  picker.innerHTML = "";

  for (let i = 0; i <= 10; i++) {

    const n = document.createElement("div");
    n.textContent = i;

    n.onclick = () => {

      callbackActual(i);
      picker.style.display = "none";

    };

    picker.appendChild(n);
  }
}

document.addEventListener("click", e => {
  if (!picker.contains(e.target) &&
      !e.target.classList.contains("gol")) {
    picker.style.display = "none";
  }
});


guardarBtn.onclick = async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Debes iniciar sesión");
    return;
  }

  const uid = user.uid;

  // Helper para calcular ganador y construir el objeto a guardar
  function buildData(p) {
    if (p.g1 === null || p.g2 === null) return null;
    let ganador = null;
    if (p.g1 > p.g2) ganador = 0;
    else if (p.g2 > p.g1) ganador = 1;
    else ganador = p.ganador;
    return { g1: p.g1, g2: p.g2, ganador };
  }

  // Guardar final
  const dataFinal = buildData(prediccionFinal);
  if (dataFinal) {
    await setDoc(
      doc(db, "predicciones", uid, "final", "datos"),
      { [prediccionFinal.Numero]: dataFinal }
    );
  }

  // Guardar tercer puesto
  const dataTercer = buildData(prediccionTercer);
  if (dataTercer) {
    await setDoc(
      doc(db, "predicciones", uid, "tercer", "datos"),
      { [prediccionTercer.Numero]: dataTercer }
    );
  }

  alert("Predicciones guardadas");
};

cargarPredicciones();
