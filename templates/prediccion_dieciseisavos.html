async function cargarPredicciones16() {

  const user = auth.currentUser;
  if (!user) return;

  const uid = user.uid;

  const ref = doc(db, "predicciones", uid, "dieciseisavos", "datos");
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const data = snap.data();

  predicciones.forEach(p => {

    const pred = data[p.Numero];

    if (pred) {
      p.g1 = pred.g1;
      p.g2 = pred.g2;
      p.ganador = pred.ganador;
    }

  });

  actualizarUIeliminatorias();
}

function actualizarUIeliminatorias() {

  document.querySelectorAll(".partido-container").forEach(container => {

    const div = container.querySelector(".partido");
    const id = div.dataset.id;

    const p = predicciones.find(x => x.Numero == id);
    if (!p) return;

    const goles = div.querySelectorAll(".gol");

    if (p.g1 !== null) goles[0].textContent = p.g1;
    if (p.g2 !== null) goles[1].textContent = p.g2;

    // 🔥 LLAMAR A LA FUNCIÓN REAL
    if (container._actualizarSelector) {
      container._actualizarSelector();
    }
  });
}


let predicciones = [];

const contenedor = document.getElementById("contenedorGrupos");


async function cargarPartidos16() {
  const snapshot = await getDocs(collection(db, "partidos"));
  const partidos = [];
  snapshot.forEach(doc => {
    const p = doc.data();
    if (p.Fase !== "Dieciseisavos de final") return;    //CAMBIAR POR "Diesciseisavos" cuando este correcto!!!
    partidos.push(p);
  });
  partidos.sort((a, b) => parseFechaHora(a) - parseFechaHora(b));
  predicciones = partidos;
  console.log(partidos);
  mostrarPartidos16(partidos);
}



function parseFechaHora(p) {

  const [d, m, a] = p.Fecha.split("/");
  const [h, min] = p.Hora.split(":");

  return new Date(a, m - 1, d, h, min);

}

function formatearFecha(p) {

  const meses = [
    "Ene","Feb","Mar","Abr","May","Jun",
    "Jul","Ago","Sep","Oct","Nov","Dic"
  ];

  const [d, m] = p.Fecha.split("/");

  return `${parseInt(d)} ${meses[m - 1]} · ${p.Hora}`;
}



function actualizarUIconPrediccionesGenerales(data) {

  if (!data) return;

  document.getElementById("inputGanador").value = data.ganador || "";
  document.getElementById("inputFinalista").value = data.finalista || "";
}




await cargarPartidos16();

function mostrarPartidos16(partidos) {

  contenedor.innerHTML = "";

  const lista = document.createElement("div");

  partidos.forEach(p => {

    p.g1 = null;
    p.g2 = null;
    p.ganador = null;

    lista.appendChild(crearPartidoEliminatoria(p));
  });

  contenedor.appendChild(lista);
}

function crearPartidoEliminatoria(p) {

  const divcontainer = document.createElement("div");
  divcontainer.className = "partido-container"; // opcional

  const div = document.createElement("div");
  div.className = "partido";
  div.dataset.id = p.Numero;

  const codigo1 = codigos_pais[p.Pais1];
  const codigo2 = codigos_pais[p.Pais2];

  div.innerHTML = `
    <div class="fecha">${formatearFecha(p)}</div>

    <div class="equipo">${p.Pais1}</div>
    <img class="bandera" src="https://flagcdn.com/w40/${codigo1}.png">

    <div class="gol">-</div>
    <div class="gol">-</div>

    <img class="bandera" src="https://flagcdn.com/w40/${codigo2}.png">
    <div class="equipo derecha">${p.Pais2}</div>
  `;

  const selector = document.createElement("div");
  selector.classList.add("selector-ganador", "hidden");

  const goles = div.querySelectorAll(".gol");

  // ======================
  // FUNCION CLAVE (NO DEPENDE DEL DOM INTERNO)
  // ======================

  function actualizarSelector() {

    if (p.g1 === null || p.g2 === null) return;

    if (p.g1 === p.g2) {

      selector.classList.remove("hidden");

      selector.innerHTML = `
        <div class="toggle">
          <span class="opcion ${p.ganador === p.Pais1 ? "activo" : ""}" data-lado="1">${p.Pais1}</span>
          <span class="opcion ${p.ganador === p.Pais2 ? "activo" : ""}" data-lado="2">${p.Pais2}</span>
        </div>
      `;

      selector.querySelectorAll(".opcion").forEach(op => {
        op.onclick = () => {
          p.ganador = op.dataset.lado == "1" ? p.Pais1 : p.Pais2;
          actualizarSelector();
        };
      });

    } else {

      selector.classList.add("hidden");

      p.ganador = p.g1 > p.g2 ? p.Pais1 : p.Pais2;
    }
  }

  // ======================
  // EVENTOS GOLES
  // ======================

  if (editable) {

    goles[0].onclick = () =>
      abrirPicker(goles[0], val => {
        goles[0].textContent = val;
        p.g1 = val;
        actualizarSelector();
      });

    goles[1].onclick = () =>
      abrirPicker(goles[1], val => {
        goles[1].textContent = val;
        p.g2 = val;
        actualizarSelector();
      });

  }

  // 🔥 IMPORTANTE: guardar referencia para luego (UI update)
  divcontainer._actualizarSelector = actualizarSelector;

  // 🔥 montar estructura
  divcontainer.appendChild(div);
  divcontainer.appendChild(selector);

  return divcontainer;
}




const picker = document.getElementById("picker");
let callbackActual = null;

function abrirPicker(elemento, callback) {

  callbackActual = callback;

  const rect = elemento.getBoundingClientRect();

  picker.style.left = rect.left + "px";
  picker.style.top = rect.bottom + 5 + "px";

  picker.style.display = "grid";

  mostrarOpciones();
}

function mostrarOpciones() {

  picker.innerHTML = "";

  for (let i = 0; i <= 10; i++) {

    const n = document.createElement("div");
    n.textContent = i;

    n.onclick = () => {

      callbackActual(i);
      picker.style.display = "none";

    };

    picker.appendChild(n);
  }
}

document.addEventListener("click", e => {
  if (!picker.contains(e.target) &&
      !e.target.classList.contains("gol")) {
    picker.style.display = "none";
  }
});


guardarBtn.onclick = async () => {

  const user = auth.currentUser;

  if (!user) {
    alert("Debes iniciar sesión");
    return;
  }

  const uid = user.uid;
  const data16 = {};

  predicciones.forEach(p => {

    if (p.g1 !== null && p.g2 !== null) {

      let ganador = null;

      if (p.g1 > p.g2) ganador = p.Pais1;
      else if (p.g2 > p.g1) ganador = p.Pais2;
      // Importante: cambiar para que sea w en vez de ganador, w=0 si gana pais1, w=1 si gana pais2
      else ganador = p.ganador; // 🔥 clave

      data16[p.Numero] = {
        g1: p.g1,
        g2: p.g2,
        ganador
      };
    }

  });

  await setDoc(
    doc(db, "predicciones", uid, "dieciseisavos", "datos"),
    data16
  );

  alert("Predicciones guardadas");
};

import { generarCuadroEliminatorias } from "../static/js/pipeline_eliminatorias.js";



const btn = document.getElementById("btnSimular");
const contenedor_bracket = document.getElementById("bracket");

let partidosGlobal = {};

const estructura = {
  izquierda: {
    dieciseisavos: [74,77,73,75,83,84,81,82],
    octavos: [89,90,93,94],
    cuartos: [97,98],
    semis: [101]
  },
  derecha: {
    dieciseisavos: [86,88,85,87,76,78,79,80],
    octavos: [95,96,91,92],
    cuartos: [100,99],
    semis: [102]
  },
  centro: {
    final: [104],
    tercer: [103]
  }
};

btn.onclick = () => {
  partidosGlobal = generarCuadroEliminatorias(grupos, combinaciones, emparejamientos);
  contenedor_bracket.classList.remove("hidden");
  renderBracket(partidosGlobal);
};


function renderBracket(partidos) {

  contenedor_bracket.innerHTML = "";

  const izq = crearLado(estructura.izquierda, partidos, false);
  const der = crearLado(estructura.derecha, partidos, true);

  const centro = crearCentro(partidos);

  contenedor_bracket.appendChild(izq);
  contenedor_bracket.appendChild(centro);
  contenedor_bracket.appendChild(der);
}


function crearLado(config, partidos, invertido = false) {

  const lado = document.createElement("div");
  lado.className = "lado";

  let rondas = Object.entries(config);

  // 🔥 invertir orden para el lado derecho
  if (invertido) {
    rondas = rondas.reverse();
    // lado.style.flexDirection = "row-reverse";
  }


  rondas.forEach(([ronda, partidosNums]) => {

    const col = document.createElement("div");
    col.className = "ronda";

    partidosNums.forEach(num => {
      col.appendChild(crearPartidoBracket(num, partidos));
    });

    lado.appendChild(col);
  });

  return lado;
}


function crearCentro(partidos) {

  const div = document.createElement("div");
  div.className = "centro";

  estructura.centro.final.forEach(n => {
    const p = crearPartidoBracket(n, partidos);
    p.classList.add("final");
    div.appendChild(p);
  });

  estructura.centro.tercer.forEach(n => {
    div.appendChild(crearPartidoBracket(n, partidos));
  });

  return div;
}

function crearPartidoBracket(num, partidos) {

  const p = partidos[num];

  const div = document.createElement("div");
  div.className = "partido-bracket";

  const e1 = crearEquipo(p.Pais1, num, 1);
  const e2 = crearEquipo(p.Pais2, num, 2);

  if (p.ganador === p.Pais1) e1.classList.add("ganador");
  if (p.ganador === p.Pais2) e2.classList.add("ganador");

  div.appendChild(e1);
  div.appendChild(e2);

  return div;
}

function crearEquipo(nombre, numPartido, lado) {

  const div = document.createElement("div");
  div.className = "equipo";
  const codigo = codigos_pais[nombre];
  div.innerHTML = `<img class="bandera" src="https://flagcdn.com/w40/${codigo}.png">` || "-";

  div.onclick = () => {

    if (!nombre) return;

    const p = partidosGlobal[numPartido];

    if (lado === 1) {
      p.ganador = p.Pais1;
      p.perdedor = p.Pais2;
    } else {
      p.ganador = p.Pais2;
      p.perdedor = p.Pais1;
    }

    avanzarGanador(numPartido);

    renderBracket(partidosGlobal);
  };

  return div;
}

function avanzarGanador(num) {
  Object.values(emparejamientos).forEach(e => {
    if (e.pais1 === "W"+num) {
      partidosGlobal[e.Numero].Pais1 = partidosGlobal[num].ganador;
    }
    if (e.pais2 === "W"+num) {
      partidosGlobal[e.Numero].Pais2 = partidosGlobal[num].ganador;
    }
    if (e.pais1 === "L"+num) {
      partidosGlobal[e.Numero].Pais1 = partidosGlobal[num].perdedor;
    }
    if (e.pais2 === "L"+num) {
      partidosGlobal[e.Numero].Pais2 = partidosGlobal[num].perdedor;
    }
  });
}

cargarPredicciones16();
